<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interactive Guide — Service Catalog | My Learnings</title>
<style>
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#1f2937;--surf3:#2d333b;
  --bdr:#30363d;--acc:#58a6ff;--acc2:#3fb950;--acc3:#f78166;
  --acc4:#d2a8ff;--acc5:#ffa657;--acc6:#39d353;
  --txt:#e6edf3;--txt2:#8b949e;--txt3:#6e7681;
  --gnew:#1a3a1a;--gnewb:#3fb950;--gnewt:#7ee787;
  --gupd:#2d1a0a;--gupdb:#f78166;--gupdt:#ffa28b;
  --gref:#1a2540;--grefb:#58a6ff;--greft:#79c0ff;
  --gwrn:#2d2008;--gwrnb:#ffa657;--gwrnt:#ffc17a;
  --gdel:#3a1a1a;--gdelb:#f85149;--gdelt:#ff9492;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column}

/* HEADER */
header{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0;flex-wrap:wrap;gap:6px}
.logo{font-size:14px;font-weight:700;white-space:nowrap}
.logo span{color:var(--acc)}
.hbadge{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--gref);color:var(--greft);border:1px solid var(--grefb)}
.stabs{display:flex;gap:3px;margin-left:auto;flex-wrap:wrap}
.stabs button{padding:5px 11px;border:1px solid var(--bdr);background:transparent;color:var(--txt2);cursor:pointer;border-radius:5px;font-size:11px;font-weight:500;transition:all .15s;white-space:nowrap}
.stabs button:hover{background:var(--surf2);color:var(--txt)}
.stabs button.active{background:var(--acc);color:#000;border-color:var(--acc)}

/* BODY */
.body{display:flex;flex:1;overflow:hidden}

/* STEP SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sidebar-title{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:10px 12px 6px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.sidebar-scroll{flex:1;overflow-y:auto}
.sitem{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.sitem:hover{background:var(--surf2)}
.sitem.active{border-left-color:var(--acc);background:#1c2333}
.sitem.done .snum{background:var(--gnewb);color:#000;border-color:var(--gnewb)}
.sitem.active .snum{background:var(--acc);color:#000;border-color:var(--acc)}
.snum{width:18px;height:18px;border-radius:50%;background:var(--surf2);border:1px solid var(--bdr);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--txt2);margin-top:1px}
.slabel{font-size:11px;color:var(--txt2);line-height:1.35}
.sitem.active .slabel{color:var(--txt);font-weight:500}
.scon{width:1px;height:8px;background:var(--bdr);margin:0 0 0 18px}

/* CENTER + RIGHT */
.center-right{display:flex;flex:1;overflow:hidden;flex-direction:column}
.center-right-top{display:flex;flex:1;overflow:hidden}

/* PREVIEW */
.preview{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.prev-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0}
.prev-title{font-size:13px;font-weight:700;color:var(--txt);flex:1;min-width:0}
.prev-desc{font-size:11px;color:var(--txt2);max-width:360px;text-align:right;line-height:1.35;flex-shrink:0}
.browser{background:#161616;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:6px;padding:6px 10px;flex-shrink:0}
.dots{display:flex;gap:4px}
.dots span{width:9px;height:9px;border-radius:50%}
.dots span:nth-child(1){background:#ff5f57}
.dots span:nth-child(2){background:#febc2e}
.dots span:nth-child(3){background:#28c840}
.urlbar{flex:1;background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;padding:3px 8px;font-size:10px;color:var(--txt2);font-family:monospace;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.screen{flex:1;overflow:hidden;position:relative;background:#111}
.screen img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;object-position:top center;display:block;transition:opacity .25s}

/* ANNOTATIONS overlay */
.ann-wrap{position:absolute;inset:0;pointer-events:none}
.ann{position:absolute;border:2px solid var(--acc);border-radius:3px;box-shadow:0 0 0 3px rgba(88,166,255,.12)}
.ann-tag{position:absolute;top:-20px;left:0;background:var(--acc);color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;white-space:nowrap}

/* DATA MODEL */
.dm-panel{width:360px;flex-shrink:0;background:var(--surf);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.dm-hdr{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:10px 12px 8px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:6px;flex-shrink:0}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--gnewb);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.dm-scroll{flex:1;overflow-y:auto;padding:8px}

.dbt{border:1px solid var(--bdr);border-radius:5px;margin-bottom:8px;overflow:hidden;font-size:10px}
.dbth{background:var(--surf2);padding:5px 8px;display:flex;align-items:center;gap:5px;border-bottom:1px solid var(--bdr)}
.dbtn{font-weight:700;color:var(--acc);font-family:monospace;font-size:10px}
.dbbadge{font-size:8px;padding:1px 4px;border-radius:2px;font-weight:700;border:1px solid}
.b-new{background:var(--gnew);color:var(--gnewt);border-color:var(--gnewb)}
.b-upd{background:var(--gupd);color:var(--gupdt);border-color:var(--gupdb)}
.b-ref{background:var(--gref);color:var(--greft);border-color:var(--grefb)}
.b-del{background:var(--gdel);color:var(--gdelt);border-color:var(--gdelb)}
.b-wrn{background:var(--gwrn);color:var(--gwrnt);border-color:var(--gwrnb)}
.dbr{display:grid;grid-template-columns:130px 1fr;border-bottom:1px solid var(--bdr)}
.dbr:last-child{border-bottom:none}
.dbf{padding:3px 6px;color:var(--txt3);font-family:monospace;border-right:1px solid var(--bdr);word-break:break-all;line-height:1.3}
.dbv{padding:3px 6px;color:var(--txt);font-family:monospace;word-break:break-all;line-height:1.3}
.hl-new{background:var(--gnew)}.hl-new .dbv{color:var(--gnewt);font-weight:700}
.hl-upd{background:var(--gupd)}.hl-upd .dbv{color:var(--gupdt);font-weight:700}
.hl-wrn{background:var(--gwrn)}.hl-wrn .dbv{color:var(--gwrnt)}
.hl-del{background:var(--gdel)}.hl-del .dbv{color:var(--gdelt)}

/* NOTES */
.notes{height:120px;flex-shrink:0;background:var(--surf);border-top:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.notes-hdr{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:6px 14px 4px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--surf)}
.notes-body{display:flex;flex-wrap:wrap;gap:5px;padding:6px 10px;overflow-y:auto;flex:1}
.chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:10px;border:1px solid;line-height:1.2}
.ch-java{background:#1a2d40;border-color:#58a6ff;color:#79c0ff}
.ch-sql{background:#2d1a2d;border-color:#d2a8ff;color:#e2beff}
.ch-cache{background:#1a2d1a;border-color:#3fb950;color:#7ee787}
.ch-event{background:#2d2008;border-color:#ffa657;color:#ffc17a}
.ch-warn{background:#3a1a1a;border-color:#f85149;color:#ff9492}
.ch-info{background:var(--surf2);border-color:var(--bdr);color:var(--txt2)}
.ch-rhino{background:#2d1a40;border-color:#a371f7;color:#c9a0ff}
.ch-db{background:#1a2540;border-color:#388bfd;color:#79c0ff}

/* CONTROLS */
.ctrl{display:flex;align-items:center;gap:8px;padding:6px 16px;background:var(--surf);border-top:1px solid var(--bdr);flex-shrink:0}
.cbtn{padding:5px 12px;border:1px solid var(--bdr);background:var(--surf2);color:var(--txt);cursor:pointer;border-radius:5px;font-size:11px;font-weight:500;transition:all .15s}
.cbtn:hover{border-color:var(--acc);color:var(--acc)}
.cbtn:disabled{opacity:.3;cursor:not-allowed}
.cbtn.pri{background:var(--acc);color:#000;border-color:var(--acc);font-weight:700}
.cbtn.pri:hover{background:#79c0ff}
.ptrack{flex:1;height:3px;background:var(--surf3);border-radius:2px;cursor:pointer;position:relative}
.pfill{height:100%;background:var(--acc);border-radius:2px;transition:width .3s}
.ctr{font-size:11px;color:var(--txt2);white-space:nowrap}
.autolbl{font-size:10px;color:var(--txt3)}
.tog{width:28px;height:14px;border-radius:7px;background:var(--surf3);border:1px solid var(--bdr);cursor:pointer;position:relative;flex-shrink:0}
.tog.on{background:var(--acc);border-color:var(--acc)}
.tog::after{content:'';position:absolute;width:10px;height:10px;top:1px;left:1px;background:#fff;border-radius:50%;transition:left .15s}
.tog.on::after{left:15px}
.speed-lbl{font-size:10px;color:var(--txt3)}
.speed-sel{background:var(--surf2);border:1px solid var(--bdr);color:var(--txt2);font-size:10px;padding:2px 5px;border-radius:4px;cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="logo">⚙ Service Catalog <span>Deep Dive</span></div>
  <div class="hbadge">glide-servicecatalog</div>
  <div class="stabs" id="stabs">
    <button type="button" class="active" onclick="loadScenario('classic')">🖥 Classic Admin</button>
    <button type="button" onclick="loadScenario('builder')">🏗 Catalog Builder</button>
    <button type="button" onclick="loadScenario('variables')">📋 Variable Types</button>
    <button type="button" onclick="loadScenario('producer')">🏭 Record Producer</button>
    <button type="button" onclick="loadScenario('policies')">🔒 UI Policies & Scripts</button>
  </div>
</header>

<div class="body">
  <div class="sidebar">
    <div class="sidebar-title">Steps</div>
    <div class="sidebar-scroll" id="sidebar-scroll"></div>
  </div>

  <div class="center-right">
    <div class="center-right-top">
      <div class="preview">
        <div class="prev-hdr">
          <div class="prev-title" id="prev-title">Loading…</div>
          <div class="prev-desc" id="prev-desc"></div>
        </div>
        <div class="browser">
          <div class="dots"><span></span><span></span><span></span></div>
          <div class="urlbar" id="urlbar"></div>
        </div>
        <div class="screen" id="screen">
          <img id="screen-img" src="" alt="">
          <div class="ann-wrap" id="ann-wrap"></div>
        </div>
      </div>

      <div class="dm-panel">
        <div class="dm-hdr"><div class="pulse"></div>Data Model Changes</div>
        <div class="dm-scroll" id="dm-scroll"></div>
      </div>
    </div>

    <div class="notes">
      <div class="notes-hdr">⚡ Processing — Classes · Listeners · DB Operations</div>
      <div class="notes-body" id="notes-body"></div>
    </div>
  </div>
</div>

<div class="ctrl">
  <button type="button" class="cbtn" id="btn-prev" onclick="prev()">◀ Prev</button>
  <button type="button" class="cbtn pri" id="btn-play" onclick="togglePlay()">▶ Play</button>
  <button type="button" class="cbtn" id="btn-next" onclick="next()">Next ▶</button>
  <div class="ptrack" id="ptrack" onclick="seek(event)"><div class="pfill" id="pfill"></div></div>
  <div class="ctr" id="ctr">1/1</div>
  <div class="autolbl">Auto</div>
  <div class="tog on" id="tog" onclick="toggleAuto()"></div>
  <div class="speed-lbl">Speed</div>
  <select class="speed-sel" id="speed" aria-label="Playback speed" onchange="updateSpeed()">
    <option value="6000">0.5×</option>
    <option value="4000" selected>1×</option>
    <option value="2500">1.5×</option>
    <option value="1500">2×</option>
  </select>
</div>

<script>
const INST='https://k8s0893285-node1.thunder.devsnc.com';
const S='screenshots/';

// ─── SCENARIO DATA ───────────────────────────────────────────────────────────
const scenarios={

// ════════════════════════════════════════════════════════
// SCENARIO 1: CLASSIC ADMIN
// ════════════════════════════════════════════════════════
classic:{name:'Classic Admin — Standard Catalog Item',steps:[
{
  title:'1 · Service Catalog Portal — Browse',
  desc:'User opens portal, Catalog.getAllCatalogs() fires, UserCriteria evaluated.',
  url:`${INST}/sp?id=sc_home`,img:`${S}01-catalog-home.png`,
  tables:[
    {n:'sc_catalog',b:'ref',rows:[
      {f:'sys_id',v:'e0d08b13c333…',h:''},
      {f:'title',v:'Service Catalog',h:''},
      {f:'active',v:'true',h:''},
      {f:'homepage',v:'→ sp_page',h:''},
    ]},
    {n:'sc_category',b:'ref',rows:[
      {f:'parent',v:'null (top-level)',h:''},
      {f:'catalog',v:'→ sc_catalog',h:''},
      {f:'active',v:'true',h:''},
    ]},
  ],
  notes:[
    {t:'java',i:'☕',v:'Catalog.getAllCatalogs() — TypeSafeCacheManager hit'},
    {t:'java',i:'☕',v:'Category.getCategories() — user-aware, domain-filtered'},
    {t:'cache',i:'💾',v:'UserCategoriesCacheableManager — per-user visibility cache'},
    {t:'sql',i:'🗄',v:'SELECT * FROM sc_catalog WHERE active=true'},
    {t:'event',i:'⚡',v:'SCStaleCacheListener watches sc_catalog for invalidation'},
  ]
},
{
  title:'2 · Classic Admin — sc_cat_item.do',
  desc:'Admin opens sc_cat_item.do to create/edit a catalog item with all its metadata.',
  url:`${INST}/sc_cat_item.do?sys_id=1e01f08ac0a801070187b08d81c0845c`,
  img:`${S}classic-item-form.png`,
  tables:[
    {n:'sc_cat_item',b:'ref',rows:[
      {f:'sys_id',v:'1e01f08ac0a80107…',h:''},
      {f:'name',v:'Sample Item',h:''},
      {f:'type',v:'item',h:'hl-wrn'},
      {f:'active',v:'true',h:''},
      {f:'category',v:'→ sc_category',h:''},
      {f:'sc_catalogs',v:'→ sc_catalog (M2M)',h:''},
      {f:'price',v:'$0.00',h:''},
      {f:'delivery_plan',v:'→ sc_cat_item_delivery_plan',h:''},
      {f:'availability',v:'on_desktop, on_mobile',h:''},
    ]},
    {n:'sc_cat_item_catalog_mtom',b:'ref',rows:[
      {f:'sc_cat_item',v:'→ sc_cat_item',h:''},
      {f:'sc_catalog',v:'→ sc_catalog',h:''},
    ]},
  ],
  notes:[
    {t:'info',i:'ℹ',v:'Classic admin: sc_cat_item.do — full GlideRecord form'},
    {t:'java',i:'☕',v:'CatalogItem.get(sysId) — Singleton cache lookup'},
    {t:'java',i:'☕',v:'CatalogUtil.canWrite() — ACL check before save'},
    {t:'cache',i:'💾',v:'StaleItemCacheFinder — invalidates on INSERT/UPDATE'},
    {t:'event',i:'⚡',v:'CatalogDBListener fires → cache chain cleared'},
  ]
},
{
  title:'3 · Add Reference Variable (item_option_new.do)',
  desc:'Admin creates a Reference-type variable — defines table, reference qualifier, and mapping.',
  url:`${INST}/item_option_new.do?sys_id=1e09bd6dc0a80107`,
  img:`${S}variable-reference-form.png`,
  tables:[
    {n:'item_option_new',b:'new',rows:[
      {f:'sys_id',v:'1e09bd6dc0a80107',h:'hl-new'},
      {f:'cat_item',v:'→ sc_cat_item',h:'hl-new'},
      {f:'name',v:'reference',h:'hl-new'},
      {f:'question_text',v:'Reference to sys_user',h:''},
      {f:'type',v:'6 (Reference)',h:'hl-wrn'},
      {f:'reference',v:'sys_user',h:'hl-wrn'},
      {f:'reference_qual',v:'active=true^department=IT',h:'hl-wrn'},
      {f:'map_to_field',v:'assigned_to (target field)',h:'hl-wrn'},
      {f:'mandatory',v:'false',h:''},
      {f:'order',v:'600',h:''},
    ]},
    {n:'question_choice (n/a for ref)',b:'ref',rows:[
      {f:'note',v:'Choice list not used for Reference type',h:''},
      {f:'used for',v:'type=2 (Select Box), type=3 (Multiple Choice)',h:''},
    ]},
  ],
  notes:[
    {t:'java',i:'☕',v:'LookupSelectQuestion.setReferenceContext() — qualifier eval'},
    {t:'java',i:'☕',v:'AbstractVariableSet.getRefResolverRecord() — transient sc_cart_item'},
    {t:'sql',i:'🗄',v:'Reference qualifier: addEncodedQuery(reference_qual)'},
    {t:'java',i:'☕',v:'map_to_field: ProducerTargetVariableMapper copies value to target'},
    {t:'info',i:'ℹ',v:'type=6 → Reference; type=18 → Lookup Select Box (cached lookup)'},
    {t:'cache',i:'💾',v:'Reference result cached per qualifier + user context'},
  ]
},
{
  title:'4 · Add Choice/Select Variable',
  desc:'Choice variable uses question_choice child records — each choice maps to a value.',
  url:`${INST}/item_option_new.do?sys_id=1e071ec6c0a80107`,
  img:`${S}variable-choice-form.png`,
  tables:[
    {n:'item_option_new',b:'ref',rows:[
      {f:'name',v:'multiple_choice',h:''},
      {f:'type',v:'3 (Multiple Choice)',h:'hl-wrn'},
      {f:'question_text',v:'Multi choice',h:''},
      {f:'default_value',v:'(none)',h:''},
    ]},
    {n:'question_choice',b:'new',rows:[
      {f:'sys_id',v:'«generated»',h:'hl-new'},
      {f:'question',v:'→ item_option_new',h:'hl-new'},
      {f:'text',v:'Option A',h:'hl-new'},
      {f:'value',v:'option_a',h:'hl-new'},
      {f:'order',v:'100',h:''},
      {f:'selected',v:'false',h:''},
    ]},
    {n:'question_choice #2',b:'new',rows:[
      {f:'text',v:'Option B',h:'hl-new'},
      {f:'value',v:'option_b',h:'hl-new'},
      {f:'order',v:'200',h:''},
    ]},
  ],
  notes:[
    {t:'sql',i:'🗄',v:'INSERT INTO question_choice per option (question=item_option_new.sys_id)'},
    {t:'java',i:'☕',v:'Question.getChoices() → List<QuestionChoice> loaded at form render'},
    {t:'info',i:'ℹ',v:'type=2 → Select Box (single); type=3 → Multiple Choice (multi-select)'},
    {t:'info',i:'ℹ',v:'type=7 → CheckBox; type=1 → Yes/No (boolean, no choices needed)'},
    {t:'cache',i:'💾',v:'choice list cached with SCStaleCacheListener on question_choice table'},
  ]
},
{
  title:'5 · Multi-Row Variable Set (ONE_TO_MANY)',
  desc:'Variable set configured as ONE_TO_MANY — each row creates a separate sc_multi_row_question_answer.',
  url:`${INST}/item_option_new_set.do?sys_id=7a86c1f673221010`,
  img:`${S}variable-set-form.png`,
  tables:[
    {n:'item_option_new_set',b:'ref',rows:[
      {f:'sys_id',v:'7a86c1f673221010',h:''},
      {f:'type',v:'one_to_many',h:'hl-wrn'},
      {f:'internal_name',v:'auto-generated by VariableSetListener',h:'hl-wrn'},
      {f:'max_rows',v:'-1 (unlimited)',h:''},
      {f:'display_title',v:'true',h:''},
    ]},
    {n:'sc_item_option_mtom',b:'ref',rows:[
      {f:'sc_cat_item',v:'→ sc_cat_item',h:''},
      {f:'variable_set',v:'→ item_option_new_set',h:''},
      {f:'order',v:'500',h:''},
    ]},
    {n:'sc_multi_row_question_answer',b:'new',rows:[
      {f:'node_type',v:'"table" (root node)',h:'hl-new'},
      {f:'node_variable_set_id',v:'→ item_option_new_set',h:'hl-new'},
      {f:'node_owner_id',v:'→ sc_cart_item or sc_req_item',h:'hl-new'},
      {f:'node_owner_table',v:'sc_cart_item',h:''},
    ]},
    {n:'sc_multi_row_question_answer (row)',b:'new',rows:[
      {f:'node_type',v:'"tr" (row)',h:'hl-new'},
      {f:'node_index',v:'System.nanoTime() — ordering key',h:'hl-wrn'},
      {f:'node_parent_id',v:'→ "table" root node',h:''},
      {f:'node_question_id',v:'→ item_option_new',h:''},
      {f:'node_value',v:'user input value',h:'hl-new'},
    ]},
  ],
  notes:[
    {t:'java',i:'☕',v:'TableVariableSet (ONE_TO_MANY) loads from IVariableModelInstanceProvider'},
    {t:'java',i:'☕',v:'TableVariableNode.addRow() — index = System.nanoTime() for ordering'},
    {t:'java',i:'☕',v:'VariableNodeDatabaseModel.save() — batch INSERT to sc_multi_row_question_answer'},
    {t:'java',i:'☕',v:'getMaxAllowedRows() = min(system_prop_limit, item_option_new_set.max_rows)'},
    {t:'event',i:'⚡',v:'CatalogDBListener → VariableSetListenerConfigMeta on INSERT/UPDATE/DELETE'},
    {t:'java',i:'☕',v:'VariableSetListener.onDelete() — cleans up JSON arrays in catalog template records'},
  ]
},
{
  title:'6 · Cart Created — Add to Cart',
  desc:'User fills variables and clicks Add to Cart. Cart.addToCart() creates sc_cart + sc_cart_item.',
  url:`${INST}/sp?id=sc_cart`,img:`${S}05-cart.png`,
  tables:[

// ─── ENGINE ──────────────────────────────────────────────────────────────────
let sc='classic',si=0,playing=false,auto=true,timer=null,speed=4000;

function loadScenario(key){
  sc=key;si=0;
  document.querySelectorAll('.stabs button').forEach(b=>{
    const map={classic:'Classic',builder:'Builder',variables:'Variable',producer:'Producer',policies:'UI Policies'};
    b.classList.toggle('active',b.textContent.includes(map[key]||key));
  });
  stopPlay();renderAll();
}

function renderAll(){renderSidebar();renderStep();}

function renderSidebar(){
  const steps=scenarios[sc].steps;
  document.getElementById('sidebar-scroll').innerHTML=steps.map((s,i)=>`
    <div class="sitem${i===si?' active':i<si?' done':''}" onclick="goTo(${i})">
      <div class="snum">${i<si?'✓':i+1}</div>
      <div class="slabel">${s.title}</div>
    </div>${i<steps.length-1?'<div class="scon"></div>':''}
  `).join('');
}

function renderStep(){
  const steps=scenarios[sc].steps;
  const s=steps[si];
  document.getElementById('prev-title').textContent=s.title;
  document.getElementById('prev-desc').textContent=s.desc;
  document.getElementById('urlbar').textContent=s.url;
  document.getElementById('screen-img').src=s.img;

  // data model
  document.getElementById('dm-scroll').innerHTML=s.tables.map(t=>`
    <div class="dbt">
      <div class="dbth">
        <span class="dbtn">${t.n}</span>
        <span class="dbbadge b-${t.b}">${t.b.toUpperCase()}</span>
      </div>
      ${t.rows.map(r=>`<div class="dbr${r.h?' '+r.h:''}"><div class="dbf">${r.f}</div><div class="dbv">${r.v}</div></div>`).join('')}
    </div>
  `).join('');

  // notes
  document.getElementById('notes-body').innerHTML=s.notes.map(n=>`
    <div class="chip ch-${n.t}"><span>${n.i}</span><span>${n.v}</span></div>
  `).join('');

  // controls
  const tot=steps.length;
  document.getElementById('ctr').textContent=`${si+1}/${tot}`;
  document.getElementById('pfill').style.width=`${((si+1)/tot)*100}%`;
  document.getElementById('btn-prev').disabled=si===0;
  document.getElementById('btn-next').disabled=si===tot-1;
  renderSidebar();
}

function goTo(i){si=i;renderAll();}
function prev(){if(si>0){si--;renderAll();}}
function next(){
  const tot=scenarios[sc].steps.length;
  if(si<tot-1){si++;renderAll();}else stopPlay();
}
function togglePlay(){playing?stopPlay():startPlay();}
function startPlay(){
  playing=true;
  document.getElementById('btn-play').textContent='⏸ Pause';
  timer=setInterval(()=>{if(auto)next();else stopPlay();},speed);
}
function stopPlay(){
  playing=false;clearInterval(timer);
  document.getElementById('btn-play').textContent='▶ Play';
}
function toggleAuto(){
  auto=!auto;
  document.getElementById('tog').classList.toggle('on',auto);
}
function updateSpeed(){
  speed=parseInt(document.getElementById('speed').value);
  if(playing){stopPlay();startPlay();}
}
function seek(e){
  const tot=scenarios[sc].steps.length;
  const pct=e.offsetX/e.currentTarget.offsetWidth;
  si=Math.max(0,Math.min(tot-1,Math.floor(pct*tot)));
  renderAll();
}

loadScenario('classic');
</script>
